  adafruit/Adafruit SSD1306@^2.5.10
build_src_filter = +<*> -<adc_test.cpp>
build_flags =
  ${common.build_flags}
  -DUSE_ADS1115=0
  -DUSE_ACS71X_CURRENT=0
  -DENABLE_BLE=0
  -DBOARD_LOLIN_S2_PICO=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DNTC_SERIES_RESISTOR_OHM=9890.0f
  -DNTC_SUPPLY_VOLTAGE=3.28f
  -DNTC_COLD_TEMP_OFFSET_C=0.0f
  -DNTC_HOT_TEMP_OFFSET_C=0.0f
  -DNTC_ADC_FULL_SCALE_V=2.50f
  -DTHEME_RETRO_AMBER=1

[env:lolin_d32_pro_adc_test]
platform = espressif32
board = lolin_d32_pro
framework = arduino
monitor_speed = 115200
build_src_filter = +<adc_test.cpp> -<main.cpp>
build_flags =
  ${common.build_flags}

