[platformio]
default_envs = lolin_s2_pico_espadc_ina219

[common]
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit BME280 Library@^2.3.0
  adafruit/Adafruit INA219@^1.2.3
  adafruit/Adafruit ADS1X15@^2.5.0
  h2zero/NimBLE-Arduino@^1.4.2
build_flags =
  -DCORE_DEBUG_LEVEL=3

[env:lolin_d32_pro_espadc_ina219]
platform = espressif32
board = lolin_d32_pro
framework = arduino
monitor_speed = 115200
lib_deps = ${common.lib_deps}
build_src_filter = +<*> -<adc_test.cpp>
build_flags =
  ${common.build_flags}
  -DUSE_ADS1115=0
  -DUSE_ACS71X_CURRENT=0
  -DENABLE_BLE=1
  -DBOARD_LOLIN_D32_PRO=1
  -DTHEME_RETRO_AMBER=1

[env:lolin_s2_pico_espadc_ina219]
platform = espressif32
board = lolin_s2_pico
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit BME280 Library@^2.3.0
  adafruit/Adafruit INA219@^1.2.3
  adafruit/Adafruit ADS1X15@^2.5.0
  adafruit/Adafruit SSD1306@^2.5.10
build_src_filter = +<*> -<adc_test.cpp>
build_flags =
  ${common.build_flags}
  -DUSE_ADS1115=0
  -DUSE_ACS71X_CURRENT=0
  -DENABLE_BLE=0
  -DBOARD_LOLIN_S2_PICO=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DNTC_SERIES_RESISTOR_OHM=9890.0f
  -DNTC_SUPPLY_VOLTAGE=3.28f
  -DNTC_COLD_TEMP_OFFSET_C=0.0f
  -DNTC_HOT_TEMP_OFFSET_C=0.0f
  -DNTC_ADC_FULL_SCALE_V=2.50f
  -DTHEME_RETRO_AMBER=1

[env:lolin_s2_pico_espadc_ina219_standalone]
platform = espressif32
board = lolin_s2_pico
framework = arduino
monitor_speed = 115200
